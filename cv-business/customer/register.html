<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar – CVPro Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/customer.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="../index.html">CV<span>Pro</span> Studio</a>
      <p>Buat Akun Pelanggan</p>
    </div>

    <h1 class="auth-title">Daftar Sekarang</h1>
    <p class="auth-subtitle">Buat akun untuk melacak pesanan Anda</p>

    <!-- Alert -->
    <div class="auth-alert" id="alertBox">
      <i class="fas fa-exclamation-circle"></i>
      <span id="alertMsg"></span>
    </div>

    <!-- Form -->
    <form id="registerForm" novalidate>

      <div class="form-group">
        <label for="name">Nama Lengkap <span style="color:var(--error)">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-user field-icon"></i>
          <input type="text" id="name" class="form-control" placeholder="Nama lengkap Anda" autocomplete="name" />
        </div>
        <span class="field-error" id="nameErr">Nama wajib diisi (min. 2 karakter)</span>
      </div>

      <div class="form-group">
        <label for="email">Email <span style="color:var(--error)">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="email" class="form-control" placeholder="contoh@email.com" autocomplete="email" />
        </div>
        <span class="field-error" id="emailErr">Email tidak valid</span>
      </div>

      <div class="form-group">
        <label for="phone">Nomor WhatsApp</label>
        <div class="input-icon-wrap">
          <i class="fab fa-whatsapp field-icon"></i>
          <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxxxx (opsional)" autocomplete="tel" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password <span style="color:var(--error)">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" autocomplete="new-password" />
        </div>
        <span class="field-error" id="passwordErr">Password minimal 6 karakter</span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Konfirmasi Password <span style="color:var(--error)">*</span></label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password" autocomplete="new-password" />
        </div>
        <span class="field-error" id="confirmErr">Password tidak cocok</span>
      </div>

      <button type="submit" class="btn-auth" id="registerBtn">
        <i class="fas fa-user-plus"></i>
        Buat Akun
      </button>

    </form>

    <p class="auth-footer">
      Sudah punya akun?
      <a href="login.html">Masuk di sini</a>
    </p>

    <p class="auth-footer" style="margin-top:10px">
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Kembali ke Website</a>
    </p>

  </div>
</div>

<script src="js/customerApi.js"></script>
<script>
(function () {
  'use strict';

  if (CustomerAuth.isLoggedIn()) {
    window.location.replace('dashboard.html');
    return;
  }

  const form         = document.getElementById('registerForm');
  const nameInput    = document.getElementById('name');
  const emailInput   = document.getElementById('email');
  const phoneInput   = document.getElementById('phone');
  const passInput    = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPassword');
  const registerBtn  = document.getElementById('registerBtn');
  const alertBox     = document.getElementById('alertBox');
  const alertMsg     = document.getElementById('alertMsg');

  function showAlert(msg, type = 'error') {
    alertMsg.textContent = msg;
    alertBox.className   = `auth-alert ${type} show`;
  }

  function hideAlert() { alertBox.classList.remove('show'); }

  function setErr(id, show) {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('show', show);
  }

  function setInputErr(el, hasErr) {
    el.classList.toggle('error', hasErr);
  }

  function validate() {
    const name    = nameInput.value.trim();
    const email   = emailInput.value.trim();
    const pass    = passInput.value;
    const confirm = confirmInput.value;
    let ok = true;

    const nameOk  = name.length >= 2;
    setErr('nameErr', !nameOk);
    setInputErr(nameInput, !nameOk);
    if (!nameOk) ok = false;

    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    setErr('emailErr', !emailOk);
    setInputErr(emailInput, !emailOk);
    if (!emailOk) ok = false;

    const passOk  = pass.length >= 6;
    setErr('passwordErr', !passOk);
    setInputErr(passInput, !passOk);
    if (!passOk) ok = false;

    const confirmOk = pass === confirm && confirm.length > 0;
    setErr('confirmErr', !confirmOk);
    setInputErr(confirmInput, !confirmOk);
    if (!confirmOk) ok = false;

    return ok;
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideAlert();
    if (!validate()) return;

    registerBtn.disabled = true;
    registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mendaftar...';

    try {
      const res = await CustomerAPI.register({
        name:     nameInput.value.trim(),
        email:    emailInput.value.trim(),
        phone:    phoneInput.value.trim() || undefined,
        password: passInput.value,
      });

      if (res.success) {
        CustomerAuth.saveSession(res.data.token, res.data.customer);
        showAlert('Pendaftaran berhasil! Mengalihkan ke Dashboard...', 'success');
        setTimeout(() => window.location.replace('dashboard.html'), 1000);
      } else {
        showAlert(res.message || 'Pendaftaran gagal');
      }
    } catch (err) {
      showAlert(err.message || 'Terjadi kesalahan, coba lagi');
    } finally {
      registerBtn.disabled = false;
      registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Buat Akun';
    }
  });

  // Live error clear
  [nameInput, emailInput, passInput, confirmInput].forEach(function (el) {
    el.addEventListener('input', function () { el.classList.remove('error'); });
  });

})();
</script>

</body>
</html>
