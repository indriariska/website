<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengeluaran – CVPro Studio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><i class="fas fa-file-alt"></i></div>
        <h2>CVPro Studio</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="/admin/orders.html" class="nav-item">
          <i class="fas fa-shopping-bag"></i><span>Pesanan</span>
        </a>
        <a href="/admin/feedback.html"  class="nav-item"><i class="fas fa-star"></i><span>Feedback</span></a>
        <a href="/admin/expenses.html" class="nav-item active">
          <i class="fas fa-receipt"></i><span>Pengeluaran</span>
        </a>
        <a href="/admin/reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Laporan</span>
        </a>
        <a href="/admin/settings.html" class="nav-item">
          <i class="fas fa-cog"></i><span>Pengaturan</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="top-bar-right">
          <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">Administrator</span>
          </div>
        </div>
      </header>

      <!-- Expenses Content -->
      <div class="content">
        <div class="page-header">
          <h1>Pengeluaran</h1>
          <p class="subtitle">Catat pengeluaran operasional bisnis</p>
        </div>

        <!-- Summary Cards -->
        <div class="stats-grid secondary">
          <div class="stat-card small">
            <div class="stat-content">
              <h3>Total Expenses</h3>
              <p class="stat-value" id="totalExpenses">Rp 0</p>
            </div>
          </div>
          <div class="stat-card small">
            <div class="stat-content">
              <h3>This Month</h3>
              <p class="stat-value" id="monthlyExpenses">Rp 0</p>
            </div>
          </div>
          <div class="stat-card small">
            <div class="stat-content">
              <h3>Today</h3>
              <p class="stat-value" id="todayExpenses">Rp 0</p>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Search expenses..." class="search-input">
          </div>
          <div class="filter-group">
            <input type="date" id="dateFrom" class="filter-input">
          </div>
          <div class="filter-group">
            <input type="date" id="dateTo" class="filter-input">
          </div>
          <button class="btn-primary" id="addExpenseBtn">
            <i class="fas fa-plus"></i>
            Add Expense
          </button>
          <button class="btn-secondary" id="exportBtn">
            <i class="fas fa-download"></i>
            Export
          </button>
        </div>

        <!-- Expenses Table -->
        <div class="table-card">
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Amount</th>
                  <th>Description</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="expensesTable">
                <tr>
                  <td colspan="5" class="loading">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Expense Modal -->
  <div class="modal" id="expenseModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="expenseModalTitle">Add Expense</h2>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="expenseForm" class="form-grid">
          <input type="hidden" id="expenseId">
          
          <div class="form-group">
            <label for="expenseTitle">Title *</label>
            <input type="text" id="expenseTitle" required>
          </div>
          
          <div class="form-group">
            <label for="expenseAmount">Amount (Rp) *</label>
            <input type="number" id="expenseAmount" required min="0">
          </div>
          
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="expenseCategory">Category</label>
            <select id="expenseCategory">
              <option value="">Select Category</option>
              <option value="Electricity">Electricity</option>
              <option value="Internet">Internet</option>
              <option value="Employee Salary">Employee Salary</option>
              <option value="Packaging">Packaging</option>
              <option value="Transportation">Transportation</option>
              <option value="Rent">Rent</option>
              <option value="Marketing">Marketing</option>
              <option value="Other">Other</option>
            </select>
          </div>
          
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="expenseDescription">Description</label>
            <textarea id="expenseDescription" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveExpenseBtn">Save Expense</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/expenses.js"></script>
</body>
</html>
