<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan – CVPro Studio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo"><i class="fas fa-file-alt"></i></div>
        <h2>CVPro Studio</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="/admin/orders.html" class="nav-item active">
          <i class="fas fa-shopping-bag"></i><span>Pesanan</span>
        </a>
        <a href="/admin/feedback.html"  class="nav-item"><i class="fas fa-star"></i><span>Feedback</span></a>
        <a href="/admin/expenses.html" class="nav-item">
          <i class="fas fa-receipt"></i><span>Pengeluaran</span>
        </a>
        <a href="/admin/reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Laporan</span>
        </a>
        <a href="/admin/settings.html" class="nav-item">
          <i class="fas fa-cog"></i><span>Pengaturan</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="top-bar-right">
          <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">Administrator</span>
          </div>
        </div>
      </header>

      <div class="content">
        <div class="page-header">
          <h1>Pesanan</h1>
          <p class="subtitle">Kelola semua pesanan layanan CV &amp; Portofolio</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Cari nama, email, layanan..." class="search-input">
          </div>
          <div class="filter-group">
            <select id="statusFilter" class="filter-select">
              <option value="">Semua Status</option>
              <option value="pending">Pending</option>
              <option value="paid">Dibayar</option>
              <option value="processing">Diproses</option>
              <option value="completed">Selesai</option>
              <option value="cancelled">Dibatalkan</option>
            </select>
          </div>
          <div class="filter-group">
            <input type="date" id="dateFrom" class="filter-input" title="Dari tanggal">
          </div>
          <div class="filter-group">
            <input type="date" id="dateTo" class="filter-input" title="Sampai tanggal">
          </div>
          <button class="btn-primary" id="exportBtn">
            <i class="fas fa-download"></i> Export CSV
          </button>
        </div>

        <!-- Orders Table -->
        <div class="table-card">
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Pelanggan</th>
                  <th>Layanan / Paket</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Pembayaran</th>
                  <th>Tanggal</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="ordersTable">
                <tr><td colspan="8" class="loading">Memuat...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div><!-- /content -->
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal" id="orderModal">
    <div class="modal-content large">
      <div class="modal-header">
        <h2>Detail Pesanan</h2>
        <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="orderModalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
