<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Store Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-store"></i>
        </div>
        <h2>Admin Panel</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item" data-page="dashboard">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/orders.html" class="nav-item active" data-page="orders">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/products.html" class="nav-item" data-page="products">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="/admin/customers.html" class="nav-item" data-page="customers">
          <i class="fas fa-users"></i>
          <span>Customers</span>
        </a>
        <a href="/admin/expenses.html" class="nav-item" data-page="expenses">
          <i class="fas fa-receipt"></i>
          <span>Expenses</span>
        </a>
        <a href="/admin/reports.html" class="nav-item" data-page="reports">
          <i class="fas fa-chart-bar"></i>
          <span>Reports</span>
        </a>
        <a href="/admin/settings.html" class="nav-item" data-page="settings">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="top-bar-right">
          <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">Administrator</span>
          </div>
        </div>
      </header>

      <!-- Orders Content -->
      <div class="content">
        <div class="page-header">
          <h1>Orders</h1>
          <p class="subtitle">Manage customer orders</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Search orders..." class="search-input">
          </div>
          <div class="filter-group">
            <select id="statusFilter" class="filter-select">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="processing">Processing</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="filter-group">
            <input type="date" id="dateFrom" class="filter-input">
          </div>
          <div class="filter-group">
            <input type="date" id="dateTo" class="filter-input">
          </div>
          <button class="btn-primary" id="exportBtn">
            <i class="fas fa-download"></i>
            Export
          </button>
        </div>

        <!-- Orders Table -->
        <div class="table-card">
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Payment</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="ordersTable">
                <tr>
                  <td colspan="8" class="loading">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal" id="orderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Order Details</h2>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body" id="orderModalBody">
        <!-- Order_detail content will be loaded here -->
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
