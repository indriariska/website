<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil – CVPro Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/customer.css" />
  <script src="js/customerApi.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

<div class="customer-layout">

  <aside class="customer-sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">
        <div class="logo-icon"><i class="fas fa-file-alt"></i></div>
        CV<span>Pro</span> Studio
      </div>
      <p class="sidebar-user-name" id="sidebarUserName">Memuat...</p>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="orders.html"    class="sidebar-nav-item"><i class="fas fa-shopping-bag"></i> Pesanan Saya</a>
      <a href="profile.html"   class="sidebar-nav-item active"><i class="fas fa-user"></i> Profil</a>
      <a href="../kontak.html" class="sidebar-nav-item"><i class="fas fa-paper-plane"></i> Pesan Baru</a>
      <a href="../index.html"  class="sidebar-nav-item"><i class="fas fa-home"></i> Ke Website</a>
    </nav>
    <div class="sidebar-footer-nav">
      <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </aside>

  <main class="customer-main">
    <header class="customer-topbar">
      <button class="topbar-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
      <div class="topbar-right">
        <div class="topbar-user">
          <span class="topbar-user-name" id="topbarName">–</span>
          <span class="topbar-user-role">Pelanggan</span>
        </div>
      </div>
    </header>

    <div class="customer-content">
      <div class="c-page-header">
        <h1><i class="fas fa-user" style="color:var(--primary);margin-right:10px"></i>Profil Saya</h1>
        <p>Edit nama, nomor, dan password akun Anda</p>
      </div>

      <div style="max-width:520px">
        <div class="section-card">

          <!-- Avatar -->
          <div class="profile-avatar" id="profileAvatar">?</div>

          <!-- Alert -->
          <div class="auth-alert" id="alertBox" style="margin-bottom:20px">
            <i class="fas fa-check-circle"></i>
            <span id="alertMsg"></span>
          </div>

          <form id="profileForm" novalidate>

            <div class="form-group">
              <label>Email (tidak bisa diubah)</label>
              <div class="input-icon-wrap">
                <i class="fas fa-envelope field-icon"></i>
                <input type="email" id="email" class="form-control" readonly
                  style="background:#f9fafb;cursor:not-allowed;color:#6b7280" />
              </div>
            </div>

            <div class="form-group">
              <label for="name">Nama Lengkap</label>
              <div class="input-icon-wrap">
                <i class="fas fa-user field-icon"></i>
                <input type="text" id="name" class="form-control" placeholder="Nama lengkap" />
              </div>
              <span class="field-error" id="nameErr">Nama minimal 2 karakter</span>
            </div>

            <div class="form-group">
              <label for="phone">Nomor WhatsApp</label>
              <div class="input-icon-wrap">
                <i class="fab fa-whatsapp field-icon"></i>
                <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxxxx" />
              </div>
            </div>

            <hr style="border:none;border-top:1px solid #f3f4f6;margin:20px 0" />
            <p style="font-size:0.82rem;color:#9ca3af;margin-bottom:16px">Kosongkan field password jika tidak ingin mengubah</p>

            <div class="form-group">
              <label for="password">Password Baru</label>
              <div class="input-icon-wrap">
                <i class="fas fa-lock field-icon"></i>
                <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" />
              </div>
              <span class="field-error" id="passwordErr">Password minimal 6 karakter</span>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Konfirmasi Password Baru</label>
              <div class="input-icon-wrap">
                <i class="fas fa-lock field-icon"></i>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Ulangi password baru" />
              </div>
              <span class="field-error" id="confirmErr">Password tidak cocok</span>
            </div>

            <button type="submit" class="btn-auth" id="saveBtn">
              <i class="fas fa-save"></i> Simpan Perubahan
            </button>

          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="c-toast" id="toast"></div>

<script>
(function () {
  'use strict';

  const cust = window._customer || {};
  document.getElementById('sidebarUserName').textContent = cust.name || '–';
  document.getElementById('topbarName').textContent      = cust.name || '–';

  // Set avatar initials
  const av = document.getElementById('profileAvatar');
  if (cust.name) av.textContent = cust.name.charAt(0).toUpperCase();

  document.getElementById('menuToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('open');
  });

  document.getElementById('logoutBtn').addEventListener('click', async function () {
    try { await CustomerAPI.logout(); } catch (_) {}
    CustomerAuth.clearSession();
    window.location.replace('login.html');
  });

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertMsg').textContent = msg;
    box.className = 'auth-alert ' + (type||'error') + ' show';
  }

  function setErr(id, show) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('show', show);
  }

  // Pre-fill from session
  async function loadProfile() {
    try {
      const res = await CustomerAPI.getProfile();
      if (res.success) {
        const p = res.data;
        document.getElementById('email').value = p.email || '';
        document.getElementById('name').value  = p.name  || '';
        document.getElementById('phone').value = p.phone || '';
        if (p.name) av.textContent = p.name.charAt(0).toUpperCase();
      }
    } catch (_) {}
  }

  loadProfile();

  document.getElementById('profileForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const pass    = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    let ok = true;

    const nameOk = name.length >= 2;
    setErr('nameErr', !nameOk);
    document.getElementById('name').classList.toggle('error', !nameOk);
    if (!nameOk) ok = false;

    if (pass) {
      const passOk = pass.length >= 6;
      setErr('passwordErr', !passOk);
      document.getElementById('password').classList.toggle('error', !passOk);
      if (!passOk) ok = false;

      const confirmOk = pass === confirm;
      setErr('confirmErr', !confirmOk);
      document.getElementById('confirmPassword').classList.toggle('error', !confirmOk);
      if (!confirmOk) ok = false;
    } else {
      setErr('passwordErr', false);
      setErr('confirmErr', false);
    }

    if (!ok) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

    try {
      const payload = { name, phone: phone || undefined };
      if (pass) payload.password = pass;

      const res = await CustomerAPI.updateProfile(payload);
      if (res.success) {
        // Refresh session data
        const fresh = await CustomerAPI.getProfile();
        if (fresh.success) {
          CustomerAuth.saveSession(CustomerAuth.getToken(), fresh.data);
          window._customer = fresh.data;
          document.getElementById('sidebarUserName').textContent = fresh.data.name;
          document.getElementById('topbarName').textContent = fresh.data.name;
          av.textContent = fresh.data.name.charAt(0).toUpperCase();
        }
        showAlert('Profil berhasil diperbarui!', 'success');
        document.getElementById('password').value = '';
        document.getElementById('confirmPassword').value = '';
      } else {
        showAlert(res.message || 'Gagal memperbarui profil', 'error');
      }
    } catch (err) {
      showAlert(err.message || 'Terjadi kesalahan', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> Simpan Perubahan';
    }
  });

})();
</script>

</body>
</html>
