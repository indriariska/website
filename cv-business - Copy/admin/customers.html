<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Store Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-store"></i>
        </div>
        <h2>Admin Panel</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item" data-page="dashboard">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/orders.html" class="nav-item" data-page="orders">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/products.html" class="nav-item" data-page="products">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="/admin/customers.html" class="nav-item active" data-page="customers">
          <i class="fas fa-users"></i>
          <span>Customers</span>
        </a>
        <a href="/admin/expenses.html" class="nav-item" data-page="expenses">
          <i class="fas fa-receipt"></i>
          <span>Expenses</span>
        </a>
        <a href="/admin/reports.html" class="nav-item" data-page="reports">
          <i class="fas fa-chart-bar"></i>
          <span>Reports</span>
        </a>
        <a href="/admin/settings.html" class="nav-item" data-page="settings">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="top-bar-right">
          <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">Administrator</span>
          </div>
        </div>
      </header>

      <!-- Customers Content -->
      <div class="content">
        <div class="page-header">
          <h1>Customers</h1>
          <p class="subtitle">Manage customer information</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Search customers..." class="search-input">
          </div>
          <button class="btn-primary" id="addCustomerBtn">
            <i class="fas fa-plus"></i>
            Add Customer
          </button>
        </div>

        <!-- Customers Table -->
        <div class="table-card">
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Address</th>
                  <th>Total Orders</th>
                  <th>Total Spending</th>
                  <th>Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="customersTable">
                <tr>
                  <td colspan="7" class="loading">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Customer Modal -->
  <div class="modal" id="customerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="customerModalTitle">Add Customer</h2>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="customerForm" class="form-grid">
          <input type="hidden" id="customerId">
          
          <div class="form-group">
            <label for="customerName">Name *</label>
            <input type="text" id="customerName" required>
          </div>
          
          <div class="form-group">
            <label for="customerPhone">Phone *</label>
            <input type="text" id="customerPhone" required>
          </div>
          
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="customerAddress">Address</label>
            <textarea id="customerAddress" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveCustomerBtn">Save Customer</button>
      </div>
    </div>
  </div>

  <!-- Customer Orders Modal -->
  <div class="modal" id="customerOrdersModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Customer Order History</h2>
        <button class="modal-close" id="closeOrdersModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body" id="customerOrdersBody">
        <!-- Orders will be loaded here -->
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/customers.js"></script>
</body>
</html>
