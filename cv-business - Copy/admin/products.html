<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Store Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fas fa-store"></i>
        </div>
        <h2>Admin Panel</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-item" data-page="dashboard">
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="/admin/orders.html" class="nav-item" data-page="orders">
          <i class="fas fa-shopping-cart"></i>
          <span>Orders</span>
        </a>
        <a href="/admin/products.html" class="nav-item active" data-page="products">
          <i class="fas fa-box"></i>
          <span>Products</span>
        </a>
        <a href="/admin/customers.html" class="nav-item" data-page="customers">
          <i class="fas fa-users"></i>
          <span>Customers</span>
        </a>
        <a href="/admin/expenses.html" class="nav-item" data-page="expenses">
          <i class="fas fa-receipt"></i>
          <span>Expenses</span>
        </a>
        <a href="/admin/reports.html" class="nav-item" data-page="reports">
          <i class="fas fa-chart-bar"></i>
          <span>Reports</span>
        </a>
        <a href="/admin/settings.html" class="nav-item" data-page="settings">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="top-bar-right">
          <div class="user-info">
            <span class="user-name" id="userName">Admin</span>
            <span class="user-role" id="userRole">Administrator</span>
          </div>
        </div>
      </header>

      <!-- Products Content -->
      <div class="content">
        <div class="page-header">
          <h1>Products</h1>
          <p class="subtitle">Manage your product inventory</p>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
          </div>
          <div class="filter-group">
            <select id="categoryFilter" class="filter-select">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="filter-group">
            <select id="stockFilter" class="filter-select">
              <option value="">All Stock</option>
              <option value="low">Low Stock (< 10)</option>
              <option value="out">Out of Stock</option>
            </select>
          </div>
          <button class="btn-primary" id="addProductBtn">
            <i class="fas fa-plus"></i>
            Add Product
          </button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="productModalTitle">Add Product</h2>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="productForm" class="form-grid">
          <input type="hidden" id="productId">
          
          <div class="form-group">
            <label for="productName">Product Name *</label>
            <input type="text" id="productName" required>
          </div>
          
          <div class="form-group">
            <label for="productCategory">Category *</label>
            <select id="productCategory" required>
              <option value="">Select Category</option>
              <option value="Elektronik">Elektronik</option>
              <option value="Aksesoris">Aksesoris</option>
              <option value="Pakaian">Pakaian</option>
              <option value="Makanan">Makanan</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="purchasePrice">Purchase Price *</label>
            <input type="number" id="purchasePrice" required min="0">
          </div>
          
          <div class="form-group">
            <label for="sellingPrice">Selling Price *</label>
            <input type="number" id="sellingPrice" required min="0">
          </div>
          
          <div class="form-group">
            <label for="stock">Stock *</label>
            <input type="number" id="stock" required min="0">
          </div>
          
          <div class="form-group">
            <label for="productImage">Product Image</label>
            <input type="file" id="productImage" accept="image/*">
          </div>
          
          <div class="form-group" style="grid-column: 1 / -1;">
            <label for="productDescription">Description</label>
            <textarea id="productDescription" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveProductBtn">Save Product</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
